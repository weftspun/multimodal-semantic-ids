[workspace]
authors = ["K. S. Ernest (iFire) Lee <ernest.lee@chibifire.com>"]
channels = ["conda-forge"]
name = "vsk_session_item_recommendation"
# win-64 for local Phase 1 (MovieLens parity, CPU-friendly); linux-64 for the
# Phase 2 CUDA encoders (TRELLIS.2, Qwen3-VL-Embedding). See decisions/.
platforms = ["linux-64", "win-64"]
version = "0.1.0"

[tasks]
metrics-test = "python -m tests.test_metrics"
etnf-test = "python -m tests.test_etnf"
phase1 = "python -m vsk_recsys.train.phase1_movielens"

[dependencies]
python = "3.11.*"
pandas = ">=2.2,<4"
pyarrow = ">=17"
scipy = ">=1.13"
duckdb = ">=1.1"

[pypi-dependencies]
# Phase 1 (MovieLens parity) — all FOSS Apache-2.0 / MIT
# CUDA build (RTX 4090, sm_89); driver supports CUDA 13.1 (backward-compat with cu12x).
torch = { version = ">=2.5.1", index = "https://download.pytorch.org/whl/cu128" }
vector-quantize-pytorch = "*"   # MIT — ResidualFSQ semantic IDs
sentence-transformers = "*"     # ModernBERT text encoder
einops = "*"
tqdm = "*"
vsk-recsys = { path = ".", editable = true }

# Phase 2 image/audio/text encoders (Qwen3-VL-Embedding, LAION-CLAP, ModernBERT)
# run in this default env (torch cu128). The mesh encoder uses the isolated `mesh`
# environment below (torch 2.8 to match the TRELLIS.2 stableprojectorz wheels).

# --- Phase 2 mesh encoder: isolated env matching the MIT stableprojectorz Windows
# wheels (torch 2.8 / cu128 / cp311). o_voxel + flex_gemm are pip-installed post-solve
# via `pixi run -e mesh setup-mesh`. See decisions/20260712-multimodal-foss-encoder-stack.md.
[feature.mesh]
platforms = ["win-64"]

[feature.mesh.dependencies]
python = "3.11.*"

[feature.mesh.pypi-dependencies]
torch = { version = "==2.8.0", index = "https://download.pytorch.org/whl/cu128" }
torchvision = { version = "==0.23.0", index = "https://download.pytorch.org/whl/cu128" }
# MIT stableprojectorz wheels installed by uv as path deps (the mesh env has no pip).
o-voxel = { path = "vendor/whl/o_voxel-0.0.1-cp311-cp311-win_amd64.whl" }
flex-gemm = { path = "vendor/whl/flex_gemm-0.0.1-cp311-cp311-win_amd64.whl" }
trimesh = "*"
safetensors = "*"
einops = "*"
numpy = "*"
plyfile = "*"
easydict = "*"
zstandard = "*"

[environments]
mesh = { features = ["mesh"], no-default-feature = true }
