name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build and release (e.g. v0.4.0)
        required: true

permissions:
  contents: write

jobs:
  release:
    name: release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: mount_drift-windows-x64.zip
          - os: macos-latest
            asset: mount_drift-macos.zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Stage assets
        shell: bash
        run: |
          # mount_drift is a library cluster (vkc_core + mount_drift_core). Ship the
          # compiled static libs plus the public headers a consumer links against.
          mkdir -p pkg/lib pkg/include
          find build \( -name '*.a' -o -name '*.lib' \) -type f -exec cp {} pkg/lib/ \;
          cp ports/*.h pkg/include/ 2>/dev/null || true
          cp adapters/vkc.h pkg/include/ 2>/dev/null || true
          ls -la pkg/lib pkg/include
          ( cd pkg && cmake -E tar cf "../${{ matrix.asset }}" --format=zip . )

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ matrix.asset }}
          fail_on_unmatched_files: true
