# Linux-64 / Python 3.9 env for reading AddBiomechanics B3D files.  nimblephysics
# ships only Linux/macOS cp39 wheels, so this env runs in WSL (pixi); it converts
# B3D → our 15-sensor ANNY calibration dataset (b3d_to_caldata.py).
# Built in WSL's native ext4 (~/addb-extract), not on /mnt/e — conda envs need
# symlink support the Windows 9p mount lacks.
[workspace]
name = "addb-extract"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.9.*"
numpy = "*"

[pypi-dependencies]
nimblephysics = "*"
pyarrow = "*"

[tasks]
probe = "python b3d_to_caldata.py --probe"
extract = "python b3d_to_caldata.py"
