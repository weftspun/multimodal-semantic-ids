name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      # solve links mount_drift's vkc_core via add_subdirectory(../mount_drift),
      # so the sibling must sit beside this repo in the workspace.
      - uses: actions/checkout@v4
        with:
          path: solve
      - uses: actions/checkout@v4
        with:
          repository: sinew-mocap/mount_drift
          path: mount_drift
          token: ${{ secrets.SINEW_CI_TOKEN || github.token }}

      - name: Configure
        run: cmake -S solve -B build -DSINEW_TESTS=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      # solve_core self-skips without the private baked soma_pheno.h, and the
      # cluster ships no unit tests; --no-tests=ignore keeps that from failing.
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure --no-tests=ignore
